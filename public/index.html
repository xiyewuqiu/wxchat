<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>微信文件传输助手</title>

    <!-- iOS Safari 专用优化 -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="format-detection" content="telephone=no">
    <meta name="msapplication-tap-highlight" content="no">

    <!-- PWA Manifest -->
    <link rel="manifest" href="./manifest.json">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
    <link rel="icon" type="image/png" sizes="32x32" href="./icons/ios/32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./icons/ios/16.png">

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/ios/180.png">
    <link rel="apple-touch-icon" sizes="152x152" href="./icons/ios/152.png">
    <link rel="apple-touch-icon" sizes="144x144" href="./icons/ios/144.png">
    <link rel="apple-touch-icon" sizes="120x120" href="./icons/ios/120.png">

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#07c160">
    <meta name="background-color" content="#ffffff">
    <meta name="apple-mobile-web-app-title" content="微信文件传输助手">

    <meta name="description" content="基于Cloudflare Workers的微信文件传输助手Web应用">
    <meta name="keywords" content="文件传输,微信,Cloudflare,Workers,PWA">
    
    <!-- 样式文件 - 新设计系统 -->
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/messages.css">
    <link rel="stylesheet" href="./css/input.css">
    <link rel="stylesheet" href="./css/ai-chat.css">
    <link rel="stylesheet" href="./css/modals.css">
    <link rel="stylesheet" href="./css/mobile.css">

    <!-- Markdown解析库 -->
    <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- 主体区域 -->
        <main class="app-main">
            <div class="chat-container">
                <!-- 消息列表 -->
                <div class="message-list" id="messageList">
                    <!-- 消息内容将由JavaScript动态加载 -->
                </div>
                
                <!-- 输入区域 -->
                <div class="input-container">
                    <!-- 隐藏的文件输入（支持多文件） -->
                    <input type="file" id="fileInput" multiple style="display: none;">

                    <!-- 上传状态显示 -->
                    <div class="upload-status" id="uploadStatus" style="display: none;">
                        <div class="upload-spinner">⏳</div>
                        <span>正在上传...</span>
                        <div class="upload-progress">
                            <div class="progress-bar" id="progressBar"></div>
                        </div>
                    </div>

                    <!-- 消息输入 -->
                    <form class="message-input" id="messageForm">
                        <div class="input-wrapper">
                            <button type="button" class="file-button" id="fileButton" title="上传文件">
                                📁
                            </button>
                            <div class="input-field-container">
                                <textarea
                                    id="messageText"
                                    placeholder="输入消息..."
                                    rows="1"
                                ></textarea>
                                <button type="button" class="function-button" id="functionButton">
                                    <svg class="function-icon" viewBox="0 0 24 24" width="16" height="16">
                                        <path fill="currentColor" d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z"/>
                                    </svg>
                                </button>
                                <button type="submit" class="send-button" id="sendButton">
                                    <svg class="send-icon" viewBox="0 0 24 24" width="20" height="20">
                                        <path fill="currentColor" d="M2,21L23,12L2,3V10L17,12L2,14V21Z"/>
                                    </svg>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </main>
        

    </div>

    <!-- JavaScript 模块 -->
    <script src="./js/config.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/api.js"></script>
    <!-- UI 子模块（必须在 ui.js 之前加载） -->
    <script src="./js/ui/messageRenderer.js"></script>
    <script src="./js/ui/markdownHandler.js"></script>
    <script src="./js/ui/imageLoader.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/fileUpload.js"></script>
    <script src="./js/realtime.js"></script>
    <script src="./js/messageHandler.js"></script>
    <script src="./js/pwa.js"></script>
    <!-- 功能组件 -->
    <script src="./js/components/functionButton.js"></script>
    <script src="./js/components/functionMenu.js"></script>
    <!-- AI模块 -->
    <script src="./js/ai/aiAPI.js"></script>
    <script src="./js/ai/aiUI.js"></script>
    <script src="./js/ai/aiHandler.js"></script>
    <!-- AI图片生成模块 -->
    <script src="./js/imageGen/imageGenAPI.js"></script>
    <script src="./js/imageGen/imageGenUI.js"></script>
    <script src="./js/imageGen/imageGenHandler.js"></script>
    <!-- 搜索模块 -->
    <script src="./js/search/searchAPI.js"></script>
    <script src="./js/search/searchUI.js"></script>
    <script src="./js/search/searchHandler.js"></script>
    <script src="./js/app.js"></script>


</body>
</html>
